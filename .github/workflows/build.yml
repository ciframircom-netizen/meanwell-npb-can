name: Build ESPHome firmware

on:
  workflow_dispatch:
  push:
    paths:
      - meanwell-npb-can.yaml
      - .github/workflows/build.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        id: esphome
        uses: esphome/build-action@v7
        with:
          yaml-file: meanwell-npb-can.yaml
          version: latest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ${{ steps.esphome.outputs.name }}/
