esphome:
  name: meanwell-npb-can
  friendly_name: MeanWell NPB CAN
  name_add_mac_suffix: false

esp32:
  board: heltec_wifi_lora_32_V3
  framework:
    type: esp-idf

logger:

ota:
  - platform: esphome

# Без пароля к твоему Wi-Fi: поднимается AP, ты вводишь Wi-Fi через captive portal
wifi:
  ap:
    ssid: "NPB-CAN-Setup"
    password: "12345678"

captive_portal:

web_server:
  port: 80

globals:
  - id: mw_curve_low
    type: uint8_t
    restore_value: no
    initial_value: '0x80'   # bit7=1 => Charger mode

  - id: mw_curve_high
    type: uint8_t
    restore_value: no
    initial_value: '0x00'

  - id: mw_sys_low
    type: uint8_t
    restore_value: no
    initial_value: '0x03'

  - id: mw_sys_high
    type: uint8_t
    restore_value: no
    initial_value: '0x04'   # 0x04 => disable write to EEPROM (как в исходном проекте)

# ---------------- A) Основные измерения (живые значения) ----------------
sensor:
  - platform: template
    name: "A1 Measured output voltage (V)"
    id: mw_measured_vout
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2

  - platform: template
    name: "A2 Measured output current (A)"
    id: mw_measured_iout
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2

  - platform: template
    name: "A3 Temperature (°C)"
    id: mw_temperature
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1

  - platform: template
    name: "A4 Target voltage accepted (V)"
    id: mw_target_voltage_accepted
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2

  - platform: template
    name: "A5 Target current accepted (A)"
    id: mw_target_current_accepted
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2

# ---------------- B) Управление ----------------
# B1. Charger ON/OFF
switch:
  - platform: template
    name: "B1 Charger ON/OFF"
    id: mw_power
    optimistic: true
    turn_on_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x00, 0x00, 0x01]
    turn_off_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x00, 0x00, 0x00]

# B7. EEPROM write enable/disable
  - platform: template
    name: "B7 EEPROM write enabled"
    id: mw_eeprom_write_enabled
    optimistic: true
    turn_on_action:
      - lambda: |-
          // enable write => clear 0x04 in high byte
          id(mw_sys_high) = (uint8_t)(id(mw_sys_high) & ~0x04);
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            return {0xC2, 0x00, id(mw_sys_low), id(mw_sys_high)};
    turn_off_action:
      - lambda: |-
          // disable write => set 0x04 in high byte
          id(mw_sys_high) = (uint8_t)(id(mw_sys_high) | 0x04);
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            return {0xC2, 0x00, id(mw_sys_low), id(mw_sys_high)};

# B8. Выбор режима Charger/PSU
select:
  - platform: template
    name: "B8 Mode (Charger/PSU)"
    id: mw_mode
    optimistic: true
    options:
      - "Charger"
      - "PSU"
    initial_option: "Charger"
    set_action:
      - lambda: |-
          // CUVE = bit7 low byte (1=Charger, 0=PSU)
          if (x == "Charger") id(mw_curve_low) = (uint8_t)(id(mw_curve_low) | 0x80);
          else id(mw_curve_low) = (uint8_t)(id(mw_curve_low) & ~0x80);
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            return {0xB4, 0x00, id(mw_curve_low), id(mw_curve_high)};

# B2..B6 + PSU 9..10 (все вводом цифрами)
number:
  # B2. Curve CV voltage (V)
  - platform: template
    name: "B2 Curve CV voltage (V)"
    id: mw_curve_cv
    unit_of_measurement: "V"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) (x * 100.0);
            return {0xB1, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  # B3. Curve CC current (A)
  - platform: template
    name: "B3 Curve CC current (A)"
    id: mw_curve_cc
    unit_of_measurement: "A"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 1000
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) (x * 100.0);
            return {0xB0, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  # B4. Curve Float voltage (V)
  - platform: template
    name: "B4 Curve Float voltage (V)"
    id: mw_curve_fv
    unit_of_measurement: "V"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) (x * 100.0);
            return {0xB2, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  # B5. Recharge restart voltage (V)
  - platform: template
    name: "B5 Recharge restart voltage (V)"
    id: mw_restart_v
    unit_of_measurement: "V"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) (x * 100.0);
            return {0xB9, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  # B6. Таймауты стадий (минуты)
  - platform: template
    name: "B6-1 CC timeout (min)"
    id: mw_cc_timeout
    unit_of_measurement: "min"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 65535
    step: 1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) x;
            return {0xB5, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  - platform: template
    name: "B6-2 CV timeout (min)"
    id: mw_cv_timeout
    unit_of_measurement: "min"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 65535
    step: 1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) x;
            return {0xB6, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  - platform: template
    name: "B6-3 FV timeout (min)"
    id: mw_fv_timeout
    unit_of_measurement: "min"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 65535
    step: 1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) x;
            return {0xB7, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  # -------- PSU (приятное дополнение) --------
  - platform: template
    name: "B9 Target Voltage (PSU) (V)"
    id: mw_target_v
    unit_of_measurement: "V"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) (x * 100.0);
            return {0x20, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  - platform: template
    name: "B10 Target Current (PSU) (A)"
    id: mw_target_i
    unit_of_measurement: "A"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 1000
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) (x * 100.0);
            return {0x30, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

# ---------------- C) Состояния/флаги аварий и режима (binary sensors) ----------------
binary_sensor:
  # FAULT_STATUS (0x0040) low byte x[2]
  - platform: template
    name: "C1 FAULT: over temperature"
    id: mw_over_temperature
  - platform: template
    name: "C2 FAULT: output over voltage"
    id: mw_output_over_voltage
  - platform: template
    name: "C3 FAULT: output over current"
    id: mw_output_over_current
  - platform: template
    name: "C4 FAULT: output short circuited"
    id: mw_output_short_circuited
  - platform: template
    name: "C5 FAULT: AC abnormal"
    id: mw_ac_abnormal
  - platform: template
    name: "C6 FAULT: output turned off"
    id: mw_output_turned_off
  - platform: template
    name: "C7 FAULT: internal temperature abnormal"
    id: mw_internal_temperature_abnormal

  # CHG_STATUS (0x00B8): low x[2], high x[3]
  - platform: template
    name: "C8 CHG: fully charged"
    id: mw_fully_charged
  - platform: template
    name: "C9 CHG: wake up unfinished"
    id: mw_wake_up_unfinished
  - platform: template
    name: "C10 CHG: temperature compensation short circuited"
    id: mw_temperature_compensation_short_circuited
  - platform: template
    name: "C11 CHG: no battery detected"
    id: mw_no_battery_detected

  # SYSTEM_STATUS (0x00C1): x[2]
  - platform: template
    name: "C12 SYS: DC output normal range"
    id: mw_dc_output_normal_range
  - platform: template
    name: "C13 SYS: initial state"
    id: mw_initial_state
  - platform: template
    name: "C14 SYS: eeprom access error"
    id: mw_eeprom_access_error

  # режим/EEPROM (из CURVE_CONFIG / SYSTEM_CONFIG)
  - platform: template
    name: "C15 CFG: charger mode (CUVE)"
    id: mw_charger_mode
  - platform: template
    name: "C16 CFG: disable write to eeprom"
    id: mw_disable_write_to_eeprom

# ---------------- CAN interface + parser ----------------
canbus:
  - platform: esp32_can
    tx_pin: GPIO7     # CTX
    rx_pin: GPIO6     # CRX
    can_id: 0xC0003   # как в исходном проекте
    use_extended_id: true
    bit_rate: 250kbps

    on_frame:
      - can_id: 0xC0003
