    id: mw_fault_ac_fail
  - platform: template
    name: "FAULT: OP_OFF"
    id: mw_fault_op_off
  - platform: template
    name: "FAULT: HI_TEMP"
    id: mw_fault_hi_temp

  # Charge status (0x00B8)
  - platform: template
    name: "CHG: Fully charged"
    id: mw_chg_fully_charged
  - platform: template
    name: "CHG: CC mode"
    id: mw_chg_cc_mode
  - platform: template
    name: "CHG: CV mode"
