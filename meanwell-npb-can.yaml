esphome:
  name: meanwell-npb-can
  friendly_name: MeanWell NPB CAN
  name_add_mac_suffix: false

esp32:
  board: heltec_wifi_lora_32_V3
  framework:
    type: esp-idf

logger:

ota:
  - platform: esphome

# Wi-Fi вводится через Captive Portal (пароль к домашнему Wi-Fi не вшивается)
wifi:
  ap:
    ssid: "NPB-CAN-Setup"
    password: "12345678"

captive_portal:

web_server:
  port: 80
  version: 3
  sorting_groups:
     - id: grp_sensor
       name: "sensor"
       sorting_weight: 1
     - id: grp_seе_cr
       name: "Управление зарядом"
       sorting_weight: 2
     - id: grp_seе-bp
       name: "Управление БП"
       sorting_weight: 3
     - id: grp_err
       name: "Ошибки"
       sorting_weight: 4

globals:
  - id: mw_curve_low
    type: uint8_t
    restore_value: no
    initial_value: '0x80'   # bit7=1 => Charger mode

  - id: mw_curve_high
    type: uint8_t
    restore_value: no
    initial_value: '0x00'

  - id: mw_sys_low
    type: uint8_t
    restore_value: no
    initial_value: '0x03'

  - id: mw_sys_high
    type: uint8_t
    restore_value: no
    initial_value: '0x04'   # 0x04 => disable write to EEPROM (как в исходном проекте)
    


# ---------------- A) Основные измерения (живые значения) ----------------
sensor:
  - platform: template
    name: "Measured output voltage (V)"
    id: mw_measured_vout
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: grp_sensor
      sorting_weight: 10
      
  - platform: template
    name: "Measured output current (A)"
    id: mw_measured_iout
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: grp_sensor
      sorting_weight: 20
      
  - platform: template
    name: "Temperature (C)"
    id: mw_temperature
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    web_server:
      sorting_group_id: grp_sensor
      sorting_weight: 30
      
  - platform: template
    name: "Target voltage accepted (V)"
    id: mw_target_voltage_accepted
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: grp_sensor
      sorting_weight: 40
      
  - platform: template
    name: "Target current accepted (A)"
    id: mw_target_current_accepted
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    web_server:
      sorting_group_id: grp_sensor
      sorting_weight: 50
      
# ---------------- B) Управление ----------------
switch:
  # B1. Charger ON/OFF
  - platform: template
    name: "B01 Charger ON-OFF"
    id: mw_power
    optimistic: true
    turn_on_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x00, 0x00, 0x01]
    turn_off_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x00, 0x00, 0x00]

  # B7. EEPROM write enable/disable
  - platform: template
    name: "B07 EEPROM write enabled"
    id: mw_eeprom_write_enabled
    optimistic: true
    turn_on_action:
      - lambda: |-
          id(mw_sys_high) = (uint8_t)(id(mw_sys_high) & ~0x04);
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            return {0xC2, 0x00, id(mw_sys_low), id(mw_sys_high)};
    turn_off_action:
      - lambda: |-
          id(mw_sys_high) = (uint8_t)(id(mw_sys_high) | 0x04);
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            return {0xC2, 0x00, id(mw_sys_low), id(mw_sys_high)};

# B8. Выбор режима Charger/PSU
select:
  - platform: template
    name: "B08 Mode (Charger-PSU)"
    id: mw_mode
    optimistic: true
    options:
      - "Charger"
      - "PSU"
    initial_option: "Charger"
    set_action:
      - lambda: |-
          if (x == "Charger") id(mw_curve_low) = (uint8_t)(id(mw_curve_low) | 0x80);
          else id(mw_curve_low) = (uint8_t)(id(mw_curve_low) & ~0x80);
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            return {0xB4, 0x00, id(mw_curve_low), id(mw_curve_high)};

number:
  # B2. Curve CV voltage (V)
  - platform: template
    name: "B02 Curve CV voltage (V)"
    id: mw_curve_cv
    unit_of_measurement: "V"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int)(x * 100.0f + 0.5f);
            return {0xB1, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

  # B3. Curve CC current (A)
  - platform: template
    name: "B03 Curve CC current (A)"
    id: mw_curve_cc
    unit_of_measurement: "A"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 1000
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int)(x * 100.0f + 0.5f);
            return {0xB0, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

  # B4. Curve Float voltage (V)
  - platform: template
    name: "B04 Curve Float voltage (V)"
    id: mw_curve_fv
    unit_of_measurement: "V"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int)(x * 100.0f + 0.5f);
            return {0xB2, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

  # B5. Recharge restart voltage (V)
  - platform: template
    name: "B05 Recharge restart voltage (V)"
    id: mw_restart_v
    unit_of_measurement: "V"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int)(x * 100.0f + 0.5f);
            return {0xB9, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

  # B6. Таймауты стадий (минуты)
  - platform: template
    name: "B06-1 CC timeout (min)"
    id: mw_cc_timeout
    unit_of_measurement: "min"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 65535
    step: 1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int)x;
            return {0xB5, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

  - platform: template
    name: "B06-2 CV timeout (min)"
    id: mw_cv_timeout
    unit_of_measurement: "min"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 65535
    step: 1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int)x;
            return {0xB6, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

  - platform: template
    name: "B06-3 FV timeout (min)"
    id: mw_fv_timeout
    unit_of_measurement: "min"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 65535
    step: 1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int)x;
            return {0xB7, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

  # -------- PSU (приятное дополнение) --------
  - platform: template
    name: "B09 Target Voltage (PSU) (V)"
    id: mw_target_v
    unit_of_measurement: "V"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int)(x * 100.0f + 0.5f);
            return {0x20, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

  - platform: template
    name: "B10 Target Current (PSU) (A)"
    id: mw_target_i
    unit_of_measurement: "A"
    optimistic: true
    mode: box
    min_value: 0
    max_value: 1000
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int)(x * 100.0f + 0.5f);
            return {0x30, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

# ---------------- C) Состояния/флаги аварий и режима ----------------
binary_sensor:
  - platform: template
    name: "C01 FAULT: over temperature"
    id: mw_over_temperature
  - platform: template
    name: "C02 FAULT: output over voltage"
    id: mw_output_over_voltage
  - platform: template
    name: "C03 FAULT: output over current"
    id: mw_output_over_current
  - platform: template
    name: "C04 FAULT: output short circuited"
    id: mw_output_short_circuited
  - platform: template
    name: "C05 FAULT: AC abnormal"
    id: mw_ac_abnormal
  - platform: template
    name: "C06 FAULT: output turned off"
    id: mw_output_turned_off
  - platform: template
    name: "C07 FAULT: internal temperature abnormal"
    id: mw_internal_temperature_abnormal

  - platform: template
    name: "C08 CHG: fully charged"
    id: mw_fully_charged
  - platform: template
    name: "C09 CHG: wake up unfinished"
    id: mw_wake_up_unfinished
  - platform: template
    name: "C10 CHG: temperature compensation short circuited"
    id: mw_temperature_compensation_short_circuited
  - platform: template
    name: "C11 CHG: no battery detected"
    id: mw_no_battery_detected

  - platform: template
    name: "C12 SYS: DC output normal range"
    id: mw_dc_output_normal_range
  - platform: template
    name: "C13 SYS: initial state"
    id: mw_initial_state
  - platform: template
    name: "C14 SYS: eeprom access error"
    id: mw_eeprom_access_error

  - platform: template
    name: "C15 CFG: charger mode (CUVE)"
    id: mw_charger_mode
  - platform: template
    name: "C16 CFG: disable write to eeprom"
    id: mw_disable_write_to_eeprom

# ---------------- CAN interface + parser ----------------
canbus:
  - platform: esp32_can
    tx_pin: GPIO7     # CTX
    rx_pin: GPIO6     # CRX
    can_id: 0xC0003
    use_extended_id: true
    bit_rate: 250kbps

    on_frame:
      - can_id: 0xC0003
        use_extended_id: true
        then:
          - lambda: |-
              // x[0]=reg_low, x[1]=reg_high, x[2]=data low, x[3]=data high
              switch (x[0]) {
                case 0x00: { // OPERATION
                  id(mw_power).publish_state(x.size() > 2 && x[2] != 0);
                  break;
                }

                case 0x20: { // VOUT_SET accepted
                  float v = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_target_voltage_accepted).publish_state(v);
                  id(mw_target_v).publish_state(v);
                  break;
                }

                case 0x30: { // IOUT_SET accepted
                  float a = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_target_current_accepted).publish_state(a);
                  id(mw_target_i).publish_state(a);
                  break;
                }

                case 0x40: { // FAULT_STATUS
                  uint8_t b = x[2];
                  id(mw_over_temperature).publish_state((b & 0x02) != 0);
                  id(mw_output_over_voltage).publish_state((b & 0x04) != 0);
                  id(mw_output_over_current).publish_state((b & 0x08) != 0);
                  id(mw_output_short_circuited).publish_state((b & 0x10) != 0);
                  id(mw_ac_abnormal).publish_state((b & 0x20) != 0);
                  id(mw_output_turned_off).publish_state((b & 0x40) != 0);
                  id(mw_internal_temperature_abnormal).publish_state((b & 0x80) != 0);
                  break;
                }

                case 0x60: { // READ_VOUT
                  float v = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_measured_vout).publish_state(v);
                  break;
                }

                case 0x61: { // READ_IOUT
                  float a = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_measured_iout).publish_state(a);
                  break;
                }

                case 0x62: { // READ_TEMPERATURE_1
                  float t = 0.1f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_temperature).publish_state(t);
                  break;
                }

                case 0xB0: { // CURVE_CC
                  float a = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_curve_cc).publish_state(a);
                  break;
                }

                case 0xB1: { // CURVE_CV
                  float v = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_curve_cv).publish_state(v);
                  break;
                }

                case 0xB2: { // CURVE_FV
                  float v = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_curve_fv).publish_state(v);
                  break;
                }

                case 0xB4: { // CURVE_CONFIG
                  id(mw_curve_low)  = x[2];
                  id(mw_curve_high) = x[3];

                  bool charger = (x[2] & 0x80) != 0;
                  id(mw_charger_mode).publish_state(charger);
                  id(mw_mode).publish_state(charger ? "Charger" : "PSU");
                  break;
                }

                case 0xB5: { // CC timeout
                  int v = (int)x[2] + 256 * (int)x[3];
                  id(mw_cc_timeout).publish_state((float)v);
                  break;
                }

                case 0xB6: { // CV timeout
                  int v = (int)x[2] + 256 * (int)x[3];
                  id(mw_cv_timeout).publish_state((float)v);
                  break;
                }

                case 0xB7: { // FV timeout
                  int v = (int)x[2] + 256 * (int)x[3];
                  id(mw_fv_timeout).publish_state((float)v);
                  break;
                }

                case 0xB8: { // CHG_STATUS
                  id(mw_fully_charged).publish_state((x[2] & 0x01) != 0);
                  id(mw_wake_up_unfinished).publish_state((x[2] & 0x20) != 0);
                  id(mw_temperature_compensation_short_circuited).publish_state((x[3] & 0x04) != 0);
                  id(mw_no_battery_detected).publish_state((x[3] & 0x08) != 0);
                  break;
                }

                case 0xB9: { // CHG_RST_VBAT
                  float v = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_restart_v).publish_state(v);
                  break;
                }

                case 0xC1: { // SYSTEM_STATUS
                  uint8_t b = x[2];
                  id(mw_dc_output_normal_range).publish_state((b & 0x02) != 0);
                  id(mw_initial_state).publish_state((b & 0x20) != 0);
                  id(mw_eeprom_access_error).publish_state((b & 0x40) != 0);
                  break;
                }

                case 0xC2: { // SYSTEM_CONFIG
                  id(mw_sys_low)  = x[2];
                  id(mw_sys_high) = x[3];
                  bool disabled = (x[3] & 0x04) != 0;
                  id(mw_disable_write_to_eeprom).publish_state(disabled);
                  id(mw_eeprom_write_enabled).publish_state(!disabled);
                  break;
                }

                default:
                  break;
              }

# ---------------- Polling (1s) ----------------
interval:
  - interval: 1s
    then:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x00, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x20, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x30, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x40, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x60, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x61, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x62, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB0, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB1, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB2, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB4, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB5, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB6, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB7, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB8, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB9, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xC1, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xC2, 0x00]
