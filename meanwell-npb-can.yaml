    name: "Target Voltage"
    id: mw_target_voltage
    unit_of_measurement: "V"
    optimistic: true
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            int v = (int) (x * 100.0f + 0.5f);  // 0.01V
            return {0x20, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

  - platform: template
    name: "Target Current"
    id: mw_target_current
    unit_of_measurement: "A"
    optimistic: true
    min_value: 0
    max_value: 1000
