esphome:
  name: meanwell-npb-can
  friendly_name: MeanWell NPB CAN
  name_add_mac_suffix: false

esp32:
  board: heltec_wifi_lora_32_V3
  framework:
    type: esp-idf

logger:

ota:
  - platform: esphome

# Без пароля к твоему Wi-Fi: сначала поднимется AP, введёшь Wi-Fi через captive portal
wifi:
  ap:
    ssid: "NPB-CAN-Setup"
    password: "12345678"

captive_portal:

web_server:
  port: 80

# ---------------- MeanWell NPB over CAN ----------------
# Master -> Charger: 0xC0103
# Charger -> Master: 0xC0003
globals:
  - id: mw_curve_low
    type: uint8_t
    restore_value: no
    initial_value: '0x80'   # bit7=1 (charger) по умолчанию

  - id: mw_curve_high
    type: uint8_t
    restore_value: no
    initial_value: '0x00'

  - id: mw_sys_low
    type: uint8_t
    restore_value: no
    initial_value: '0x03'

  - id: mw_sys_high
    type: uint8_t
    restore_value: no
    initial_value: '0x04'   # bit 0x04 = disable write to eeprom (как в исходном проекте)

# ---------------- UI: measurements ----------------
sensor:
  - platform: template
    name: "Measured output voltage"
    id: mw_measured_vout
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2

  - platform: template
    name: "Measured output current"
    id: mw_measured_iout
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2

  - platform: template
    name: "Temperature"
    id: mw_temperature
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1

  - platform: template
    name: "Target voltage (accepted)"
    id: mw_target_voltage_accepted
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2

  - platform: template
    name: "Target current (accepted)"
    id: mw_target_current_accepted
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2

# ---------------- UI: controls ----------------
switch:
  - platform: template
    name: "Charger ON/OFF"
    id: mw_power
    optimistic: true
    turn_on_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x00, 0x00, 0x01]
    turn_off_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x00, 0x00, 0x00]

  - platform: template
    name: "EEPROM write enabled"
    id: mw_eeprom_write_enabled
    optimistic: true
    turn_on_action:
      # enable write => clear 0x04 in high byte
      - lambda: |-
          id(mw_sys_high) = (uint8_t)(id(mw_sys_high) & ~0x04);
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            return {0xC2, 0x00, id(mw_sys_low), id(mw_sys_high)};
    turn_off_action:
      # disable write => set 0x04 in high byte
      - lambda: |-
          id(mw_sys_high) = (uint8_t)(id(mw_sys_high) | 0x04);
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            return {0xC2, 0x00, id(mw_sys_low), id(mw_sys_high)};

select:
  - platform: template
    name: "Mode (Charger/PSU)"
    id: mw_mode
    optimistic: true
    options:
      - "Charger"
      - "PSU"
    initial_option: "Charger"
    set_action:
      - lambda: |-
          // CUVE = bit7 low byte (1=Charger, 0=PSU)
          if (x == "Charger") id(mw_curve_low) = (uint8_t)(id(mw_curve_low) | 0x80);
          else id(mw_curve_low) = (uint8_t)(id(mw_curve_low) & ~0x80);
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            return {0xB4, 0x00, id(mw_curve_low), id(mw_curve_high)};

number:
  # --- Charger curve ---
  - platform: template
    name: "Curve CC current"
    id: mw_curve_cc
    unit_of_measurement: "A"
    optimistic: true
    min_value: 0
    max_value: 1000
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) (x * 100.0);
            return {0xB0, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  - platform: template
    name: "Curve CV voltage"
    id: mw_curve_cv
    unit_of_measurement: "V"
    optimistic: true
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) (x * 100.0);
            return {0xB1, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  - platform: template
    name: "Curve Float voltage"
    id: mw_curve_fv
    unit_of_measurement: "V"
    optimistic: true
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) (x * 100.0);
            return {0xB2, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  - platform: template
    name: "Recharge restart voltage"
    id: mw_restart_v
    unit_of_measurement: "V"
    optimistic: true
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) (x * 100.0);
            return {0xB9, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  # --- Timeouts (минуты: пишем целым числом) ---
  - platform: template
    name: "CC timeout (min)"
    id: mw_cc_timeout
    unit_of_measurement: "min"
    optimistic: true
    min_value: 0
    max_value: 65535
    step: 1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) x;
            return {0xB5, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  - platform: template
    name: "CV timeout (min)"
    id: mw_cv_timeout
    unit_of_measurement: "min"
    optimistic: true
    min_value: 0
    max_value: 65535
    step: 1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) x;
            return {0xB6, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  - platform: template
    name: "FV timeout (min)"
    id: mw_fv_timeout
    unit_of_measurement: "min"
    optimistic: true
    min_value: 0
    max_value: 65535
    step: 1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) x;
            return {0xB7, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  # --- PSU (дополнение) ---
  - platform: template
    name: "Target Voltage (PSU)"
    id: mw_target_v
    unit_of_measurement: "V"
    optimistic: true
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) (x * 100.0);
            return {0x20, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

  - platform: template
    name: "Target Current (PSU)"
    id: mw_target_i
    unit_of_measurement: "A"
    optimistic: true
    min_value: 0
    max_value: 1000
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: !lambda |-
            int v = (int) (x * 100.0);
            return {0x30, 0x00, (uint8_t)(v % 256), (uint8_t)(v / 256)};

# ---------------- UI: flags (как в базовом проекте) ----------------
binary_sensor:
  # FAULT_STATUS (0x0040) low byte x[2]
  - platform: template
    name: "FAULT: over temperature"
    id: mw_over_temperature
  - platform: template
    name: "FAULT: output over voltage"
    id: mw_output_over_voltage
  - platform: template
    name: "FAULT: output over current"
    id: mw_output_over_current
  - platform: template
    name: "FAULT: output short circuited"
    id: mw_output_short
  - platform: template
    name: "FAULT: AC abnormal"
    id: mw_ac_abnormal
  - platform: template
    name: "FAULT: output turned off"
    id: mw_output_turned_off
  - platform: template
    name: "FAULT: internal temperature abnormal"
    id: mw_internal_temperature_abnormal

  # CHG_STATUS (0x00B8): low x[2], high x[3]
  - platform: template
    name: "CHG: fully charged"
    id: mw_fully_charged
  - platform: template
    name: "CHG: wake up unfinished"
    id: mw_wake_up_unfinished
  - platform: template
    name: "CHG: temperature compensation short circuited"
    id: mw_temp_comp_short
  - platform: template
    name: "CHG: no battery detected"
    id: mw_no_battery

  # SYSTEM_STATUS (0x00C1): x[2]
  - platform: template
    name: "SYS: DC output normal range"
    id: mw_dc_output_normal
  - platform: template
    name: "SYS: initial state"
    id: mw_initial_state
  - platform: template
    name: "SYS: eeprom access error"
    id: mw_eeprom_access_error

  # Mode/config
  - platform: template
    name: "CFG: charger mode (CUVE)"
    id: mw_charger_mode
  - platform: template
    name: "CFG: disable write to eeprom"
    id: mw_disable_write_to_eeprom

# ---------------- CAN interface + parser ----------------
canbus:
  - platform: esp32_can
    tx_pin: GPIO7     # CTX
    rx_pin: GPIO6     # CRX
    can_id: 0xC0103
    use_extended_id: true
    bit_rate: 250kbps

    on_frame:
      - can_id: 0xC0003
        use_extended_id: true
        then:
          - lambda: |-
              switch (x[0]) {
                case 0x00: { // OPERATION
                  id(mw_power).publish_state(x.size() > 2 && x[2] != 0);
                  break;
                }

                case 0x20: { // VOUT_SET (accepted)
                  float v = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_target_voltage_accepted).publish_state(v);
                  id(mw_target_v).publish_state(v);
                  break;
                }

                case 0x30: { // IOUT_SET (accepted)
                  float a = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_target_current_accepted).publish_state(a);
                  id(mw_target_i).publish_state(a);
                  break;
                }

                case 0x40: { // FAULT_STATUS
                  uint8_t b = x[2];
                  id(mw_over_temperature).publish_state((b & 0x02) != 0);
                  id(mw_output_over_voltage).publish_state((b & 0x04) != 0);
                  id(mw_output_over_current).publish_state((b & 0x08) != 0);
                  id(mw_output_short).publish_state((b & 0x10) != 0);
                  id(mw_ac_abnormal).publish_state((b & 0x20) != 0);
                  id(mw_output_turned_off).publish_state((b & 0x40) != 0);
                  id(mw_internal_temperature_abnormal).publish_state((b & 0x80) != 0);
                  break;
                }

                case 0x60: { // READ_VOUT
                  float v = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_measured_vout).publish_state(v);
                  break;
                }

                case 0x61: { // READ_IOUT
                  float a = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_measured_iout).publish_state(a);
                  break;
                }

                case 0x62: { // READ_TEMPERATURE_1
                  float t = 0.1f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_temperature).publish_state(t);
                  break;
                }

                case 0xB0: { // CURVE_CC
                  float a = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_curve_cc).publish_state(a);
                  break;
                }

                case 0xB1: { // CURVE_CV
                  float v = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_curve_cv).publish_state(v);
                  break;
                }

                case 0xB2: { // CURVE_FV
                  float v = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_curve_fv).publish_state(v);
                  break;
                }

                case 0xB4: { // CURVE_CONFIG
                  id(mw_curve_low) = x[2];
                  id(mw_curve_high) = x[3];

                  bool charger = (x[2] & 0x80) != 0;
                  id(mw_charger_mode).publish_state(charger);
                  id(mw_mode).publish_state(charger ? "Charger" : "PSU");
                  break;
                }

                case 0xB5: { // CC timeout
                  int v = (int)x[2] + 256 * (int)x[3];
                  id(mw_cc_timeout).publish_state((float)v);
                  break;
                }

                case 0xB6: { // CV timeout
                  int v = (int)x[2] + 256 * (int)x[3];
                  id(mw_cv_timeout).publish_state((float)v);
                  break;
                }

                case 0xB7: { // FV timeout
                  int v = (int)x[2] + 256 * (int)x[3];
                  id(mw_fv_timeout).publish_state((float)v);
                  break;
                }

                case 0xB8: { // CHG_STATUS
                  id(mw_fully_charged).publish_state((x[2] & 0x01) != 0);
                  id(mw_wake_up_unfinished).publish_state((x[2] & 0x20) != 0);
                  id(mw_temp_comp_short).publish_state((x[3] & 0x04) != 0);
                  id(mw_no_battery).publish_state((x[3] & 0x08) != 0);
                  break;
                }

                case 0xB9: { // CHG_RST_VBAT
                  float v = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_restart_v).publish_state(v);
                  break;
                }

                case 0xC1: { // SYSTEM_STATUS
                  uint8_t b = x[2];
                  id(mw_dc_output_normal).publish_state((b & 0x02) != 0);
                  id(mw_initial_state).publish_state((b & 0x20) != 0);
                  id(mw_eeprom_access_error).publish_state((b & 0x40) != 0);
                  break;
                }

                case 0xC2: { // SYSTEM_CONFIG
                  id(mw_sys_low) = x[2];
                  id(mw_sys_high) = x[3];

                  bool disabled = (x[3] & 0x04) != 0;
                  id(mw_disable_write_to_eeprom).publish_state(disabled);
                  id(mw_eeprom_write_enabled).publish_state(!disabled);
                  break;
                }

                default:
                  break;
              }

# ---------------- Polling (1s) ----------------
interval:
  - interval: 1s
    then:
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x00, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x20, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x30, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x40, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x60, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x61, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0x62, 0x00]
      - delay: 50ms

      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB0, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB1, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB2, 0x00]
      - delay: 50ms

      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB4, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB5, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB6, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB7, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB8, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xB9, 0x00]
      - delay: 50ms

      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xC1, 0x00]
      - delay: 50ms
      - canbus.send:
          use_extended_id: true
          can_id: 0xC0103
          data: [0xC2, 0x00]
