  # Mode/config reflections
  - platform: template
    name: "CFG: Charger mode (CUVE)"
    id: mw_cfg_charger_mode
  - platform: template
    name: "CFG: EEPROM write disabled (EEP_OFF)"
    id: mw_cfg_eep_off

# ---------------- CAN interface + parser ----------------
canbus:
  - platform: esp32_can
    tx_pin: ${can_tx_pin}
    rx_pin: ${can_rx_pin}
    can_id: ${mw_node_id}
    use_extended_id: true
    bit_rate: 250kbps

    on_frame:
      - can_id: ${mw_can_rx_id}
        use_extended_id: true
        then:
          - lambda: |-
              // Protocol: x[0]=reg low byte, x[1]=reg high byte, x[2]=data LSB, x[3]=data MSB (for 2-byte responses)
              switch (x[0]) {

                case 0x00: { // OPERATION readback
                  id(mw_output_enable).publish_state(x[2] != 0);
                  break;
                }

                case 0x20: { // VOUT_SET
                  float v = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_target_voltage).publish_state(v);
                  break;
                }

                case 0x30: { // IOUT_SET
                  float a = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_target_current).publish_state(a);
                  break;
                }

                case 0x40: { // FAULT_STATUS
                  uint8_t b = x[2];
                  id(mw_fault_fan_fail).publish_state((b & 0x01) != 0);
                  id(mw_fault_otp).publish_state((b & 0x02) != 0);
                  id(mw_fault_ovp).publish_state((b & 0x04) != 0);
                  id(mw_fault_olp).publish_state((b & 0x08) != 0);
                  id(mw_fault_short).publish_state((b & 0x10) != 0);
                  id(mw_fault_ac_fail).publish_state((b & 0x20) != 0);
                  id(mw_fault_op_off).publish_state((b & 0x40) != 0);
                  id(mw_fault_hi_temp).publish_state((b & 0x80) != 0);
                  break;
                }

                case 0x60: { // READ_VOUT
                  float v = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_measured_vout).publish_state(v);
                  break;
                }

                case 0x61: { // READ_IOUT
                  float a = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_measured_iout).publish_state(a);
                  break;
                }

                case 0x62: { // READ_TEMPERATURE_1
                  float t = 0.1f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_temperature).publish_state(t);
                  break;
                }

                // Curve values (F=0.01)
                case 0xB0: { // CURVE_CC
                  float a = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_curve_cc).publish_state(a);
                  break;
                }

                case 0xB1: { // CURVE_CV
                  float v = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_curve_cv).publish_state(v);
                  break;
                }

                case 0xB2: { // CURVE_FV
                  float v = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_curve_fv).publish_state(v);
                  break;
                }

                case 0xB4: { // CURVE_CONFIG
                  id(mw_curve_config_low) = x[2];
                  id(mw_curve_config_high) = x[3];

                  bool charger = (x[2] & 0x80) != 0;
                  id(mw_cfg_charger_mode).publish_state(charger);
                  id(mw_mode).publish_state(charger ? "Charger" : "PSU");

                  id(mw_restart_enable).publish_state((x[3] & 0x08) != 0);
                  id(mw_cc_timeout_enable).publish_state((x[3] & 0x01) != 0);
                  id(mw_cv_timeout_enable).publish_state((x[3] & 0x02) != 0);
                  id(mw_fv_timeout_enable).publish_state((x[3] & 0x04) != 0);
                  break;
                }

                // Timeouts (minutes)
                case 0xB5: { // CURVE_CC_TIMEOUT
                  int v = (int)x[2] + 256 * (int)x[3];
                  id(mw_cc_timeout_min).publish_state((float)v);
                  break;
                }
                case 0xB6: { // CURVE_CV_TIMEOUT
                  int v = (int)x[2] + 256 * (int)x[3];
                  id(mw_cv_timeout_min).publish_state((float)v);
                  break;
                }
                case 0xB7: { // CURVE_FV_TIMEOUT
                  int v = (int)x[2] + 256 * (int)x[3];
                  id(mw_fv_timeout_min).publish_state((float)v);
                  break;
                }

                case 0xB8: { // CHG_STATUS
                  uint8_t low = x[2];
                  uint8_t high = x[3];

                  id(mw_chg_fully_charged).publish_state((low & 0x01) != 0);
                  id(mw_chg_cc_mode).publish_state((low & 0x02) != 0);
                  id(mw_chg_cv_mode).publish_state((low & 0x04) != 0);
                  id(mw_chg_fv_mode).publish_state((low & 0x08) != 0);

                  // WAKEUP_STOP: 0=wakeup finished, 1=wakeup not finished
                  id(mw_chg_wakeup_unfinished).publish_state((low & 0x40) != 0);

                  id(mw_chg_ntc_error).publish_state((high & 0x04) != 0);
                  id(mw_chg_no_battery).publish_state((high & 0x08) != 0);

                  id(mw_chg_cctof).publish_state((high & 0x20) != 0);
                  id(mw_chg_cvtof).publish_state((high & 0x40) != 0);
                  id(mw_chg_fvtof).publish_state((high & 0x80) != 0);
                  break;
                }

                case 0xB9: { // CHG_RST_VBAT (F=0.01)
                  float v = 0.01f * ((float)x[2] + 256.0f * (float)x[3]);
                  id(mw_chg_rst_vbat).publish_state(v);
                  break;
                }

                case 0xC1: { // SYSTEM_STATUS
                  uint8_t b = x[2];
                  id(mw_sys_dc_ok).publish_state((b & 0x02) != 0);
                  id(mw_sys_initial_state).publish_state((b & 0x20) != 0);
                  id(mw_sys_eep_error).publish_state((b & 0x40) != 0);
                  break;
                }

                case 0xC2: { // SYSTEM_CONFIG
                  id(mw_system_config_low) = x[2];
                  id(mw_system_config_high) = x[3];

                  bool eep_off = (x[3] & 0x04) != 0;
                  id(mw_cfg_eep_off).publish_state(eep_off);
                  id(mw_eeprom_write_enabled).publish_state(!eep_off);
                  break;
                }

                default:
                  break;
              }
