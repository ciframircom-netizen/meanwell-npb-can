esphome:
  name: meanwell-npb-can
  friendly_name: MeanWell NPB CAN
  min_version: 2025.9.0
  name_add_mac_suffix: false

esp32:
  board: heltec_wifi_lora_32_V3
  framework:
    type: esp-idf

logger:

ota:
  - platform: esphome

api:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "NPB-CAN-Setup"
    password: "12345678"

captive_portal:

web_server:
  port: 80

# ---------------- MeanWell NPB over CAN ----------------
substitutions:
  mw_can_tx_id: "0xC0103"   # master->charger (write/read requests)
  mw_can_rx_id: "0xC0003"   # charger->master (responses)
  mw_node_id:   "0xC0003"   # required by ESPHome canbus component
  can_rx_pin: "GPIO6"       # CRX
  can_tx_pin: "GPIO7"       # CTX

globals:
  - id: mw_curve_config_low
    type: uint8_t
    restore_value: no
    initial_value: '0x80'   # default: Charger mode (CUVE=1)
  - id: mw_curve_config_high
    type: uint8_t
    restore_value: no
    initial_value: '0x00'

  - id: mw_system_config_low
    type: uint8_t
    restore_value: no
    initial_value: '0x03'
  - id: mw_system_config_high
    type: uint8_t
    restore_value: no
    initial_value: '0x04'   # default: EEP_OFF=1 (write to EEPROM disabled)

script:
  - id: npb_poll
    mode: queued
    then:
      # OPERATION / status
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0x00, 0x00] }
      - delay: 40ms

      # PSU setpoints (also useful to show what charger accepted)
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0x20, 0x00] } # VOUT_SET read
      - delay: 40ms
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0x30, 0x00] } # IOUT_SET read
      - delay: 40ms

      # Fault / live measurements
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0x40, 0x00] } # FAULT_STATUS
      - delay: 40ms
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0x60, 0x00] } # READ_VOUT
      - delay: 40ms
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0x61, 0x00] } # READ_IOUT
      - delay: 40ms
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0x62, 0x00] } # READ_TEMPERATURE_1
      - delay: 40ms

      # Charger curve values
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0xB0, 0x00] } # CURVE_CC
      - delay: 40ms
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0xB1, 0x00] } # CURVE_CV
      - delay: 40ms
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0xB2, 0x00] } # CURVE_FV
      - delay: 40ms

      # Charger curve config + timeouts + status + restart voltage
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0xB4, 0x00] } # CURVE_CONFIG
      - delay: 40ms
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0xB5, 0x00] } # CURVE_CC_TIMEOUT
      - delay: 40ms
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0xB6, 0x00] } # CURVE_CV_TIMEOUT
      - delay: 40ms
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0xB7, 0x00] } # CURVE_FV_TIMEOUT
      - delay: 40ms
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0xB8, 0x00] } # CHG_STATUS
      - delay: 40ms
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0xB9, 0x00] } # CHG_RST_VBAT
      - delay: 40ms

      # System status/config
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0xC1, 0x00] } # SYSTEM_STATUS
      - delay: 40ms
      - canbus.send: { use_extended_id: true, can_id: ${mw_can_tx_id}, data: [0xC2, 0x00] } # SYSTEM_CONFIG

interval:
  - interval: 1s
    then:
      - script.execute: npb_poll

# ---------------- UI: live measurements ----------------
sensor:
  - platform: template
    name: "Measured output voltage"
    id: mw_measured_vout
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2

  - platform: template
    name: "Measured output current"
    id: mw_measured_iout
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2

  - platform: template
    name: "Temperature"
    id: mw_temperature
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1

# ---------------- UI: Charger controls (curve / timeouts / restart) ----------------
select:
  - platform: template
    name: "Mode"
    id: mw_mode
    optimistic: true
    options:
      - "Charger"
      - "PSU"
    initial_option: "Charger"
    set_action:
      - lambda: |-
          // CUVE bit7 in low byte: 1=Charger, 0=PSU
          uint8_t low = id(mw_curve_config_low);
          uint8_t high = id(mw_curve_config_high);

          if (x == "Charger") low |= 0x80;
          else low &= ~0x80;

          id(mw_curve_config_low) = low;
          id(mw_curve_config_high) = high;

      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            return {0xB4, 0x00, id(mw_curve_config_low), id(mw_curve_config_high)};

switch:
  - platform: template
    name: "Charger ON/OFF"
    id: mw_output_enable
    optimistic: true
    turn_on_action:
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: [0x00, 0x00, 0x01]
    turn_off_action:
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: [0x00, 0x00, 0x00]

  - platform: template
    name: "EEPROM write enabled"
    id: mw_eeprom_write_enabled
    optimistic: true
    turn_on_action:
      - lambda: |-
          // EEP_OFF is bit2 of high byte: 0=write enabled, 1=write disabled
          uint8_t low = id(mw_system_config_low);
          uint8_t high = id(mw_system_config_high);
          high &= ~0x04; // clear EEP_OFF
          id(mw_system_config_low) = low;
          id(mw_system_config_high) = high;
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            return {0xC2, 0x00, id(mw_system_config_low), id(mw_system_config_high)}
    turn_off_action:
      - lambda: |-
          uint8_t low = id(mw_system_config_low);
          uint8_t high = id(mw_system_config_high);
          high |= 0x04; // set EEP_OFF
          id(mw_system_config_low) = low;
          id(mw_system_config_high) = high;
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            return {0xC2, 0x00, id(mw_system_config_low), id(mw_system_config_high)}

  - platform: template
    name: "Recharge restart enable (RSTE)"
    id: mw_restart_enable
    optimistic: true
    turn_on_action:
      - lambda: |-
          // RSTE is bit3 of CURVE_CONFIG high byte
          uint8_t low = id(mw_curve_config_low);
          uint8_t high = id(mw_curve_config_high);
          high |= 0x08;
          id(mw_curve_config_low) = low;
          id(mw_curve_config_high) = high;
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            return {0xB4, 0x00, id(mw_curve_config_low), id(mw_curve_config_high)}
    turn_off_action:
      - lambda: |-
          uint8_t low = id(mw_curve_config_low);
          uint8_t high = id(mw_curve_config_high);
          high &= ~0x08;
          id(mw_curve_config_low) = low;
          id(mw_curve_config_high) = high;
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            return {0xB4, 0x00, id(mw_curve_config_low), id(mw_curve_config_high)}

  - platform: template
    name: "CC timeout enable (CCTOE)"
    id: mw_cc_timeout_enable
    optimistic: true
    turn_on_action:
      - lambda: |-
          uint8_t low = id(mw_curve_config_low);
          uint8_t high = id(mw_curve_config_high);
          high |= 0x01;
          id(mw_curve_config_low) = low;
          id(mw_curve_config_high) = high;
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            return {0xB4, 0x00, id(mw_curve_config_low), id(mw_curve_config_high)}
    turn_off_action:
      - lambda: |-
          uint8_t low = id(mw_curve_config_low);
          uint8_t high = id(mw_curve_config_high);
          high &= ~0x01;
          id(mw_curve_config_low) = low;
          id(mw_curve_config_high) = high;
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            return {0xB4, 0x00, id(mw_curve_config_low), id(mw_curve_config_high)}

  - platform: template
    name: "CV timeout enable (CVTOE)"
    id: mw_cv_timeout_enable
    optimistic: true
    turn_on_action:
      - lambda: |-
          uint8_t low = id(mw_curve_config_low);
          uint8_t high = id(mw_curve_config_high);
          high |= 0x02;
          id(mw_curve_config_low) = low;
          id(mw_curve_config_high) = high;
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            return {0xB4, 0x00, id(mw_curve_config_low), id(mw_curve_config_high)}
    turn_off_action:
      - lambda: |-
          uint8_t low = id(mw_curve_config_low);
          uint8_t high = id(mw_curve_config_high);
          high &= ~0x02;
          id(mw_curve_config_low) = low;
          id(mw_curve_config_high) = high;
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            return {0xB4, 0x00, id(mw_curve_config_low), id(mw_curve_config_high)}

  - platform: template
    name: "FV timeout enable (FVTOE)"
    id: mw_fv_timeout_enable
    optimistic: true
    turn_on_action:
      - lambda: |-
          uint8_t low = id(mw_curve_config_low);
          uint8_t high = id(mw_curve_config_high);
          high |= 0x04;
          id(mw_curve_config_low) = low;
          id(mw_curve_config_high) = high;
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            return {0xB4, 0x00, id(mw_curve_config_low), id(mw_curve_config_high)}
    turn_off_action:
      - lambda: |-
          uint8_t low = id(mw_curve_config_low);
          uint8_t high = id(mw_curve_config_high);
          high &= ~0x04;
          id(mw_curve_config_low) = low;
          id(mw_curve_config_high) = high;
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            return {0xB4, 0x00, id(mw_curve_config_low), id(mw_curve_config_high)}

number:
  # Charger curve
  - platform: template
    name: "Curve CC current"
    id: mw_curve_cc
    unit_of_measurement: "A"
    optimistic: true
    min_value: 0
    max_value: 1000
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            int v = (int) (x * 100.0f + 0.5f);  // F=0.01
            return {0xB0, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

  - platform: template
    name: "Curve CV voltage"
    id: mw_curve_cv
    unit_of_measurement: "V"
    optimistic: true
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            int v = (int) (x * 100.0f + 0.5f);  // F=0.01
            return {0xB1, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

  - platform: template
    name: "Curve Float voltage"
    id: mw_curve_fv
    unit_of_measurement: "V"
    optimistic: true
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            int v = (int) (x * 100.0f + 0.5f);  // F=0.01
            return {0xB2, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

  - platform: template
    name: "Recharge restart voltage"
    id: mw_chg_rst_vbat
    unit_of_measurement: "V"
    optimistic: true
    min_value: 0
    max_value: 200
    step: 0.1
    set_action:
      - canbus.send:
          use_extended_id: true
