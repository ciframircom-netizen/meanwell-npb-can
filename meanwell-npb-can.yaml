          data: !lambda |-
            int v = (int) (x * 100.0f + 0.5f);  // F=0.01
            return {0xB9, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

  # Timeouts (minutes)
  - platform: template
    name: "CC timeout (min)"
    id: mw_cc_timeout_min
    unit_of_measurement: "min"
    optimistic: true
    min_value: 0
    max_value: 64800
    step: 1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            int v = (int) (x + 0.5f);
            return {0xB5, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

  - platform: template
    name: "CV timeout (min)"
    id: mw_cv_timeout_min
    unit_of_measurement: "min"
    optimistic: true
    min_value: 0
    max_value: 64800
    step: 1
    set_action:
      - canbus.send:
          use_extended_id: true
          can_id: ${mw_can_tx_id}
          data: !lambda |-
            int v = (int) (x + 0.5f);
            return {0xB6, 0x00, (uint8_t)(v & 0xFF), (uint8_t)((v >> 8) & 0xFF)};

  - platform: template
    name: "FV timeout (min)"
    id: mw_fv_timeout_min
